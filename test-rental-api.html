<!DOCTYPE html>
<html>
<head>
    <title>Ijara API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🏠 Ijara API Test</h1>
    
    <div class="test">
        <h3>Test 1: Health Check</h3>
        <button onclick="testHealth()">Test Health</button>
        <pre id="health-result"></pre>
    </div>
    
    <div class="test">
        <h3>Test 2: Ijara Buyurtmalari</h3>
        <button onclick="testRentalOrders()">Test Rental Orders</button>
        <pre id="orders-result"></pre>
    </div>
    
    <div class="test">
        <h3>Test 3: Ijara Mahsulotlari</h3>
        <button onclick="testRentalProducts()">Test Rental Products</button>
        <pre id="products-result"></pre>
    </div>

    <script>
        const API_BASE = 'https://wnondmqmuvjugbomyolz.supabase.co/functions/v1/make-server-27d0d16c';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indub25kbXFtdXZqdWdib215b3p6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjQxMDYxMTEsImV4cCI6MjAzOTY4MjExMX0.q_J3w2L6XnS6RgZlqUPu1nJz9P6x2g9lFqWkG8Z0D4o';
        
        async function testHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                document.getElementById('health-result').textContent = JSON.stringify(data, null, 2);
                document.getElementById('health-result').parentElement.className = 'test success';
            } catch (error) {
                document.getElementById('health-result').textContent = 'Error: ' + error.message;
                document.getElementById('health-result').parentElement.className = 'test error';
            }
        }
        
        async function testRentalOrders() {
            try {
                const response = await fetch(`${API_BASE}/rentals/orders/test-branch-id`, {
                    headers: {
                        'Authorization': `Bearer ${ANON_KEY}`,
                        'apikey': ANON_KEY
                    }
                });
                const data = await response.json();
                document.getElementById('orders-result').textContent = JSON.stringify(data, null, 2);
                document.getElementById('orders-result').parentElement.className = response.ok ? 'test success' : 'test error';
            } catch (error) {
                document.getElementById('orders-result').textContent = 'Error: ' + error.message;
                document.getElementById('orders-result').parentElement.className = 'test error';
            }
        }
        
        async function testRentalProducts() {
            try {
                const response = await fetch(`${API_BASE}/rentals/products/test-branch-id`, {
                    headers: {
                        'Authorization': `Bearer ${ANON_KEY}`,
                        'apikey': ANON_KEY
                    }
                });
                const data = await response.json();
                document.getElementById('products-result').textContent = JSON.stringify(data, null, 2);
                document.getElementById('products-result').parentElement.className = response.ok ? 'test success' : 'test error';
            } catch (error) {
                document.getElementById('products-result').textContent = 'Error: ' + error.message;
                document.getElementById('products-result').parentElement.className = 'test error';
            }
        }
        
        // Auto test on load
        window.onload = function() {
            console.log('Testing API...');
            testHealth();
            setTimeout(testRentalOrders, 1000);
            setTimeout(testRentalProducts, 2000);
        };
    </script>
</body>
</html>
