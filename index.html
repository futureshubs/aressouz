<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        try {
          var raw = (localStorage.getItem('theme') || '').trim().toLowerCase();
          var t = 'system';
          if (raw === 'light' || raw === 'dark' || raw === 'system') t = raw;
          var prefersDark = (function () {
            if (!window.matchMedia) return false;
            try {
              if (window.matchMedia('(prefers-color-scheme: light)').matches) return false;
              return window.matchMedia('(prefers-color-scheme: dark)').matches;
            } catch (e) {
              return false;
            }
          })();
          var dark;
          if (t === 'light') dark = false;
          else if (t === 'dark') dark = true;
          else dark = prefersDark;
          if (dark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
          var cs = document.querySelector('meta[name="color-scheme"]');
          if (cs) cs.setAttribute('content', dark ? 'dark' : 'light');
          var tc = document.querySelector('meta[name="theme-color"]');
          if (tc) tc.setAttribute('content', dark ? '#0a0a0a' : '#f9fafb');
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#14b8a6" />
    <meta name="description" content="ARESSO — market, do‘kon, taomlar va xizmatlar" />
    <meta name="application-name" content="ARESSO" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ARESSO" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <title>ARESSO</title>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function () {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
